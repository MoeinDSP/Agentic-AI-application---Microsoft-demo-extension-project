version: "3.9"

services:
  agent2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent2_clustering

    ports:
      - "${AGENT_HOST:-0.0.0.0}:${AGENT_PORT:-8001}:8001"

    env_file:
      - .env

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD", "python", "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/.well-known/agent.json')"
        ]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
